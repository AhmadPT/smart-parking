{% extends 'core/base.html' %}

{% block title %}{{ title }} - SmartPark{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-8">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Zone Details</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Name *</label>
                        {{ form.name }}
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                        {{ form.location }}
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Max Capacity *</label>
                        {{ form.max_capacity }}
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Current Count</label>
                        {{ form.current_count }}
                    </div>
                </div>
            </div>

            <div>
                <label class="flex items-center">
                    {{ form.is_active }}
                    <span class="ml-2 text-gray-700">Active</span>
                </label>
            </div>

            <div class="flex gap-4">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg">
                    <i class="fas fa-save"></i> Save
                </button>
                <a href="{% url 'access:zones' %}" class="bg-gray-600 hover:bg-gray-700 text-white font-semibold py-2 px-6 rounded-lg">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
